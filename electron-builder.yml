appId: com.sineeng.w17groundstation
productName: W17 Ground Station
directories:
  output: dist
files:
  - main/**
  - renderer/**
  - shared/**
  - package.json
# mediamtx ships as an unpacked resource (a native binary spawned by absolute
# path from process.resourcesPath -- it cannot run from inside the asar).
extraResources:
  - from: mediamtx
    to: mediamtx
    filter: ['**/*']
win:
  target: nsis
  # Unsigned for a one-off gift build: Windows SmartScreen shows a first-run
  # "unknown publisher" prompt; click through. Sign later if desired.
# If a serial telemetry source is added, its native module needs
# @electron/rebuild + asarUnpack here. The WiFi telemetry path avoids that.
asarUnpack: []
